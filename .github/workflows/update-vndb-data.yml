name: Update VNDB data

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  DATA_RELEASE_TAG: data-latest
  DATA_RELEASE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/data-latest/public/data

jobs:
  update-vndb-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install dump extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Download and extract VNDB dump
        run: |
          rm -rf .tmp-vndb-dump
          mkdir -p .tmp-vndb-dump/extract
          curl -L --retry 5 --retry-delay 20 --fail https://dl.vndb.org/dump/vndb-db-latest.tar.zst -o .tmp-vndb-dump/vndb-db-latest.tar.zst
          tar -xf .tmp-vndb-dump/vndb-db-latest.tar.zst -C .tmp-vndb-dump/extract

      - name: Remove old generated compressed data
        run: |
          git rm -f --ignore-unmatch public/data/vndb-prototype*.json.gz public/data/manifest.json
          rm -f public/data/vndb-prototype*.json.gz public/data/vndb-prototype.json

      - name: Generate local data
        run: npm run generate:data
        env:
          VNDB_DATA_RELEASE_BASE_URL: ${{ env.DATA_RELEASE_BASE_URL }}

      - name: Build project
        run: npm run build

      - name: Upload complete JSON artifact
        uses: actions/upload-artifact@v7
        with:
          name: vndb-prototype-json
          path: public/data/vndb-prototype.json
          if-no-files-found: error
          retention-days: 14

      - name: Commit updated generated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update VNDB generated data"
          file_pattern: public/data/vndb-prototype*.json.gz public/data/manifest.json public/data/vndb-meta-translations.json public/data/vndb-meta-description-translations.json public/data/NOTICE-VNDB-DATA.txt public/data/LICENSE-*.txt

      - name: Recreate data release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          generated_at=$(node -p "JSON.parse(require('fs').readFileSync('public/data/manifest.json', 'utf8')).generatedAt")
          cat > release-notes.md <<EOF
          Generated at ${generated_at}

          This release contains a VNDB-derived search index. See NOTICE-VNDB-DATA.txt and the included license files for data licensing details.
          EOF
          gh release delete "$DATA_RELEASE_TAG" --cleanup-tag --yes || true
          gh release create "$DATA_RELEASE_TAG" public/data/vndb-prototype*.json.gz public/data/manifest.json public/data/NOTICE-VNDB-DATA.txt public/data/LICENSE-*.txt --title "VNDB data latest" --notes-file release-notes.md
